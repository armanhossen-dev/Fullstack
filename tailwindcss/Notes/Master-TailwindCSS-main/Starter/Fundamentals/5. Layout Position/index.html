<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>TailwindCSS</title>
  </head>
  <body class="p-20">
    <a href="https://ahrn-fullstack-learning-2026.vercel.app/">
        <button class="
                    relative px-8 py-3 text-white font-semibold text-lg rounded-2xl
                    bg-rose-600 
                    backdrop-blur-xl
                    border border-black/10
                    shadow-lg shadow-rose-100/10
                    transiton-all duration-300 ease-out
                    hover:shadow-rose-900/50 hover:scale-105
                    hover:text-xl
                    active:scale-95 active:shadow-rose-600
                    overflow-hidden">
                    Home
        </button>
    </a>
    
    <h2 class="mt-5">Position</h2>
    <a target="_blank" href="https://tailwindcss.com/docs/position">
      <button class="p-3 bg-black text-white">See More</button>
    </a>
    <!-- 
      position
      Utilities for controlling how an element is positioned in the document.

      static      position: static;
      fixed       position: fixed;
      absolute    position: absolute;
      relative    position: relative;
      sticky      position: sticky; 
    -->
    <div class="relative w-1/2 h-40 bg-sky-200">
      <p>Relative</p>
      <div class="absolute bottom-0 right-0 bg-sky-500 p-4 text-white">Absoulte</div>
    </div> 

    <div class="relative w-1/2 h-40 bg-sky-200 mt-5">
      <p>Relative</p>
      <div class="absolute left-0 top-0 bg-sky-500/50 p-4">Absoulte</div>
    </div>  

    <div class="relative w-1/2 h-40 bg-sky-200 mt-5 p-5">
      <p>Relative with padding 5</p>
      <div class="absolute left-0 top-0 bg-sky-500/50 p-4">Absoulte, top-0,left-0</div>
    </div>  

    <div class="relative w-1/2 h-40 bg-sky-200 mt-5">
      <p>Relative</p>
      <div class="absolute right-0 top-0 bg-sky-500/50 p-4">Absoulte, top-0,right-0</div>
    </div>  

    <div class="relative w-1/2 h-40 bg-sky-200 mt-5">
      <p>Relative</p>
      <div class="absolute left-0 bottom-0 bg-sky-500/50 p-4">Absoulte, bottom-0,left-0</div>
    </div>  

    <hr class="my-5">

    <h2 class="mt-5">Display</h2>
    <a target="_blank" href="https://tailwindcss.com/docs/display">
      <button class="p-3 bg-black text-white">See More</button>
    </a>
    <!-- 
      display
      Utilities for controlling the display box type of an element.

      Class               Styles
      inline              display: inline;
      block               display: block;
      inline-block        display: inline-block;
      flow-root           display: flow-root;
      flex                display: flex;
      inline-flex         display: inline-flex;
      grid                display: grid;
      inline-grid         display: inline-grid;
      contents            display: contents;
      table               display: table;
      inline-table        display: inline-table;
      table-caption       display: table-caption;
      table-column        display: table-column;
      table-column-group  display: table-column-group;
      table-footer-group  display: table-footer-group;
      table-cell          display: table-cell;
      table-row-group     display: table-row-group;
      table-header-group  display: table-header-group;
      table-row           display: table-row;
      list-item           display: list-item;
      hidden              display: none;

      sr-only             position: absolute;
                          width: 1px;
                          height: 1px;
                          padding: 0;
                          margin: -1px;
                          overflow: hidden;
                          clip-path: inset(50%);
                          white-space: nowrap;
                          border-width: 0;
                          
      not-sr-only         position: static;
                          width: auto;
                          height: auto;
                          padding: 0;
                          margin: 0;
                          overflow: visible;
                          clip-path: none;
                          white-space: normal;
    -->
    


  </body>
</html>
